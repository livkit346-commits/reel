workflows:
  android-workflow:
    name: Android Release Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      groups:
        - google_play # For publishing later
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
      - name: Restore gradlew permissions
        script: chmod +x android/gradlew
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK & AAB
        script: |
          flutter build apk --release
          flutter build appbundle --release
      - name: List artifacts (Debug)
        script: |
          find build -name "*.apk"
          find build -name "*.aab"
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - livkit346@gmail.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS IPA (no codesign)
        script: |
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
    publishing:
      email:
        recipients:
          - livkit346@gmail.com
        notify:
          success: true
          failure: true
